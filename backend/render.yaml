services:
  - type: web
    name: postassistant-api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postassistant-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_API_KEY
        sync: false  # You'll add this manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://postassistant.pt,https://postassistant.ai,https://postassistant.vercel.app,http://localhost:3000
      - key: PORT
        value: 10000

databases:
  - name: postassistant-db
    databaseName: postassistant
    user: postassistant
    plan: free